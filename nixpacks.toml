[phases.setup]
nixPkgs = ["nodejs_22", "ffmpeg", "curl"]

[phases.install]
cmds = [
  "npm ci --include=dev",
  "mkdir -p /app/bin",
  "curl -fsSL -o /app/bin/yt-dlp https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp_linux",
  "chmod +x /app/bin/yt-dlp",
]

[phases.build]
cmds = ["npm run build"]

[start]
cmd = "node dist/src/index.js"
